<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Reaper{% endblock %}</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/static/img/favicon-64.png">
  <link rel="apple-touch-icon" href="/static/img/reaper.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand">
        <img src="/static/img/reaper.png" alt="" class="brand-logo">
        <span class="brand-name">Reaper</span>
      </a>
      <nav class="site-nav">
        {% if user %}
          <a class="btn btn-primary btn-sm" href="{{ bot_invite_url() }}">+ Add to server</a>
          <span class="user-chip">{{ user.username }}</span>
          <a class="link-muted" href="/logout">Log out</a>
        {% else %}
          <a class="btn btn-primary btn-sm" href="/login">Log in with Discord</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
